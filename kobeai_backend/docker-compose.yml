services:
  # MySQL 已在服务器上运行，此处跳过
  # 如需独立部署，取消下面注释即可
  # mysql:
  #   image: mysql:8.0
  #   container_name: kobeai-mysql
  #   restart: always
  #   ports:
  #     - "3306:3306"
  #   environment:
  #     MYSQL_ROOT_PASSWORD: kobe200800
  #     MYSQL_DATABASE: IntelliFlowAI
  #     MYSQL_CHARACTER_SET_SERVER: utf8mb4
  #     MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
  #   volumes:
  #     - mysql_data:/var/lib/mysql
  #   command: >
  #     --default-authentication-plugin=mysql_native_password
  #     --character-set-server=utf8mb4
  #     --collation-server=utf8mb4_unicode_ci

  # Redis 7
  redis:
    image: redis:alpine
    container_name: kobeai-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  # RabbitMQ 3.12 (带管理界面)
  rabbitmq:
    image: rabbitmq:management
    container_name: kobeai-rabbitmq
    restart: always
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: wangliang
      RABBITMQ_DEFAULT_PASS: kobe200800
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

  # MinIO
  minio:
    image: minio/minio:latest
    container_name: kobeai-minio
    restart: always
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"

volumes:
  mysql_data:
  redis_data:
  rabbitmq_data:
  minio_data:
